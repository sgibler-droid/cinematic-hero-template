<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#07111e">
  <title>Aperture — Cinematic Hero Template</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="hero" id="hero">
    <div class="hero__media" aria-hidden="true">
      <video autoplay muted loop playsinline poster="assets/hero-cinematic.jpg">
        <source src="assets/hero.webm" type="video/webm">
        <source src="assets/hero.mp4" type="video/mp4">
      </video>
      <div class="hero__poster"></div>
    </div>
    <div class="hero__veil"></div>
    <div class="hero__grain" aria-hidden="true"></div>

    <nav class="nav" aria-label="Primary navigation">
      <a class="brand" href="#" aria-label="Aperture home"><span class="brand__mark"></span>APERTURE</a>
      <div class="nav__links">
        <a href="#work">Work</a><a href="#about">About</a><a href="#contact">Contact</a>
      </div>
      <a class="pill pill--glass nav__cta" href="#contact">Start a project <span>↗</span></a>
    </nav>

    <section class="hero__content">
      <p class="eyebrow"><span></span>Independent creative studio · 2026</p>
      <h1>Ideas that move<br>at the speed of <em>feeling.</em></h1>
      <p class="lede">A flexible cinematic homepage template for ambitious stories, products, and experiences.</p>
      <div class="actions">
        <a class="pill pill--light" href="#work">Explore the work <span>↗</span></a>
        <button class="pill pill--glass" id="reelButton" type="button"><span class="play">▶</span> Play showreel</button>
      </div>
    </section>

    <footer class="hero__footer">
      <p>Scroll to discover</p>
      <div class="scroll-line"><span></span></div>
      <p class="location">37.7749° N<br>122.4194° W</p>
    </footer>
  </main>
  <script src="script.js"></script>
</body>
</html>
